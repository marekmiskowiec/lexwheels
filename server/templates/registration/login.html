{% extends "base.html" %}
{% block title %}Logowanie | LexWheels{% endblock %}
{% block content %}
<section class="panel" style="max-width: 640px;">
  <h1>Zaloguj się</h1>
  <p class="meta">Użyj adresu email albo loginu.</p>
  <form method="post" class="list">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Zaloguj</button>
  </form>
  <p><a href="{% url 'password_reset' %}">Nie pamiętasz hasła?</a></p>
</section>
{% endblock %}

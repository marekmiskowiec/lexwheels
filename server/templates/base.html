<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}LexWheels{% endblock %}</title>
  <style>
    :root { --bg: #f4efe5; --panel: #fffdf9; --line: #d8c7a8; --ink: #1d1a16; --muted: #6f6251; --accent: #b54920; --accent-dark: #7a2f12; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Georgia, "Times New Roman", serif; color: var(--ink); background: linear-gradient(180deg, #faf6ef 0%, #efe5d3 100%); }
    a { color: var(--accent); text-decoration: none; } a:hover { text-decoration: underline; }
    .shell { max-width: 1180px; margin: 0 auto; padding: 24px 18px 48px; }
    .nav { display: flex; flex-wrap: wrap; gap: 14px; justify-content: space-between; align-items: center; margin-bottom: 24px; padding: 16px 20px; border: 1px solid var(--line); border-radius: 18px; background: rgba(255,253,249,.95); }
    .nav-links, .nav-auth { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
    .brand { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.03em; }
    .panel { border: 1px solid var(--line); border-radius: 20px; background: var(--panel); padding: 20px; box-shadow: 0 18px 50px rgba(56, 39, 19, 0.08); }
    .grid { display: grid; gap: 18px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .card { border: 1px solid #eadcc3; border-radius: 16px; background: #fff; padding: 16px; }
    .thumb { width: 100%; height: 150px; object-fit: contain; background: #faf6ef; border-radius: 12px; border: 1px solid #eadcc3; }
    .meta { color: var(--muted); font-size: .95rem; }
    .hero { margin-bottom: 22px; }
    h1,h2,h3 { margin-top: 0; }
    form.inline, .filters { display: flex; gap: 10px; flex-wrap: wrap; align-items: end; }
    input, select, textarea { width: 100%; padding: 12px 14px; border: 1px solid var(--line); border-radius: 12px; font: inherit; background: #fff; }
    textarea { min-height: 120px; resize: vertical; }
    button, .button { display: inline-block; padding: 11px 16px; border: 0; border-radius: 12px; background: var(--accent); color: #fff; font: inherit; cursor: pointer; }
    button.secondary, .button.secondary { background: #8f806a; }
    .list { display: grid; gap: 12px; }
    .list-item { padding: 14px 16px; border: 1px solid #eadcc3; border-radius: 14px; background: #fff; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 999px; background: #f0e4cf; color: var(--accent-dark); font-size: .9rem; }
    .messages { margin-bottom: 16px; }
    .message { padding: 12px 14px; border-radius: 12px; background: #f0e4cf; }
    .pagination { display: flex; gap: 12px; margin-top: 20px; }
    .danger-zone { display: flex; gap: 8px; align-items: center; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="shell">
    <nav class="nav">
      <div class="nav-links">
        <a class="brand" href="{% url 'catalog:model-list' %}">LexWheels</a>
        <a href="{% url 'catalog:model-list' %}">Katalog</a>
        {% if user.is_authenticated %}<a href="{% url 'collections:dashboard' %}">Moje kolekcje</a>{% endif %}
        <a href="/admin/">Admin</a>
      </div>
      <div class="nav-auth">
        {% if user.is_authenticated %}
          <span class="meta">{{ user.email }}</span>
          <form method="post" action="{% url 'logout' %}">{% csrf_token %}<button class="secondary" type="submit">Wyloguj</button></form>
        {% else %}
          <a href="{% url 'login' %}">Logowanie</a>
          <a href="{% url 'accounts:register' %}">Rejestracja</a>
        {% endif %}
      </div>
    </nav>
    {% block content %}{% endblock %}
  </div>
</body>
</html>

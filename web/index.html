<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hot Wheels 2022 List</title>
  <style>
    :root {
      --bg: #f5f1e8;
      --panel: #fffdf8;
      --line: #d7c8ae;
      --text: #1e1d1a;
      --muted: #6f6658;
      --accent: #b4471f;
      --accent-dark: #7f2c0d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(180, 71, 31, 0.14), transparent 28%),
        linear-gradient(180deg, #f8f4ec 0%, #efe5d3 100%);
      color: var(--text);
    }

    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    .hero {
      margin-bottom: 24px;
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 253, 248, 0.92);
      box-shadow: 0 18px 50px rgba(56, 39, 19, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 3.6rem);
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 0;
      max-width: 62ch;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.5;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin: 20px 0 0;
    }

    .search {
      flex: 1 1 320px;
      min-width: 240px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }

    .count {
      padding: 10px 14px;
      border-radius: 999px;
      background: #f0e4cf;
      color: var(--accent-dark);
      font-weight: 700;
      white-space: nowrap;
    }

    .status {
      margin: 16px 0 0;
      color: var(--muted);
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      box-shadow: 0 18px 50px rgba(56, 39, 19, 0.08);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 920px;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      padding: 14px 16px;
      background: #f0e4cf;
      color: var(--accent-dark);
      text-align: left;
      font-size: 0.95rem;
      border-bottom: 1px solid var(--line);
    }

    tbody td {
      padding: 12px 16px;
      vertical-align: middle;
      border-bottom: 1px solid #eee2cb;
    }

    tbody tr:hover {
      background: #fcf6eb;
    }

    .number {
      font-variant-numeric: tabular-nums;
      font-weight: 700;
    }

    .thumb {
      width: 132px;
      height: 82px;
      object-fit: contain;
      display: block;
      border-radius: 10px;
      background: #faf6ef;
      border: 1px solid #eadcc2;
    }

    .photo-link {
      display: inline-block;
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    .photo-link:hover {
      text-decoration: underline;
    }

    .photo-cell {
      min-width: 160px;
    }

    .photo-fallback {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 132px;
      height: 82px;
      padding: 8px;
      border: 1px dashed #d3c19f;
      border-radius: 10px;
      background: #faf6ef;
      color: var(--muted);
      text-align: center;
      font-size: 0.9rem;
      line-height: 1.2;
    }

    .empty {
      padding: 20px;
      color: var(--muted);
    }

    @media (max-width: 800px) {
      .page {
        padding: 18px 12px 28px;
      }

      .hero {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>Hot Wheels Mainline 2022</h1>
      <p class="subtitle">
        Podgląd listy wygenerowanej z pliku <code>data/catalog/hot-wheels/mainline/2022.json</code>.
        Wyszukiwanie działa po numerze, nazwie modelu, serii i numerze serii.
      </p>
      <div class="controls">
        <input id="searchInput" class="search" type="search" placeholder="Szukaj modelu, numeru albo serii...">
        <div id="count" class="count">0 rekordów</div>
      </div>
      <p id="status" class="status">Ładowanie danych...</p>
    </section>

    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Toy</th>
            <th>Number</th>
            <th>Model Name</th>
            <th>Series</th>
            <th>Series Number</th>
            <th>Zdjęcie</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr>
            <td colspan="6" class="empty">Ładowanie...</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <script>
    const searchInput = document.getElementById('searchInput');
    const countNode = document.getElementById('count');
    const statusNode = document.getElementById('status');
    const tableBody = document.getElementById('tableBody');

    let records = [];

    function resolveAssetPath(path) {
      if (!path) {
        return '';
      }

      if (/^(https?:)?\/\//i.test(path)) {
        return path;
      }

      return `../${String(path).replace(/^\.?\//, '')}`;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function updateCount(total, visible) {
      countNode.textContent = visible === total
        ? `${total} rekordów`
        : `${visible} z ${total} rekordów`;
    }

    function renderRows(items) {
      if (!items.length) {
        tableBody.innerHTML = '<tr><td colspan="6" class="empty">Brak wyników dla tego filtra.</td></tr>';
        return;
      }

      tableBody.innerHTML = items.map((item) => {
        const imageSource = resolveAssetPath(item['Local Photo']) || item.Photo;
        const photoLink = item.Photo || imageSource;
        const photoCell = imageSource
          ? `
            <a class="photo-link" href="${escapeHtml(photoLink)}" target="_blank" rel="noreferrer">
              <img
                class="thumb"
                src="${escapeHtml(imageSource)}"
                alt="${escapeHtml(item['Model Name'] || 'Hot Wheels photo')}"
                loading="lazy"
                referrerpolicy="no-referrer"
                onerror="this.outerHTML='<span class=&quot;photo-fallback&quot;>Brak podglądu</span>'"
              >
            </a>
          `
          : '<span class="photo-fallback">Brak zdjęcia</span>';

        return `
          <tr>
            <td class="number">${escapeHtml(item.Toy)}</td>
            <td class="number">${escapeHtml(item.Number)}</td>
            <td>${escapeHtml(item['Model Name'])}</td>
            <td>${escapeHtml(item.Series)}</td>
            <td>${escapeHtml(item['Series Number'])}</td>
            <td class="photo-cell">${photoCell}</td>
          </tr>
        `;
      }).join('');
    }

    function applyFilter() {
      const query = searchInput.value.trim().toLowerCase();
      const filtered = query
        ? records.filter((item) => {
            const haystack = [
              item.Toy,
              item.Number,
              item['Model Name'],
              item.Series,
              item['Series Number']
            ].join(' ').toLowerCase();

            return haystack.includes(query);
          })
        : records;

      renderRows(filtered);
      updateCount(records.length, filtered.length);
    }

    async function loadData() {
      try {
        const response = await fetch('../data/catalog/hot-wheels/mainline/2022.json');
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        records = await response.json();
        statusNode.textContent = 'Dane załadowane.';
        updateCount(records.length, records.length);
        renderRows(records);
      } catch (error) {
        statusNode.textContent = 'Nie udało się wczytać pliku JSON.';
        tableBody.innerHTML = `
          <tr>
            <td colspan="6" class="empty">
              Uruchom prosty serwer w tym katalogu, np. <code>python3 -m http.server</code>,
              a potem otwórz <code>http://localhost:8000/web/index.html</code>.
            </td>
          </tr>
        `;
      }
    }

    searchInput.addEventListener('input', applyFilter);
    loadData();
  </script>
</body>
</html>

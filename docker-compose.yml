services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lexwheels}
      POSTGRES_USER: ${POSTGRES_USER:-lexwheels}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lexwheels}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: server/Dockerfile
    command: sh -c "python manage.py migrate && python manage.py import_models && python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
    depends_on:
      - db

volumes:
  postgres_data:
